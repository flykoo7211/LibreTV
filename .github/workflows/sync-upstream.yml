name: Sync Upstream
on:
  schedule:
    - cron: '0 0 * * *' # 每天运行一次
  workflow_dispatch: # 允许手动触发
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: 配置 Git
        run: |
          git config user.name "flykoo7211"
          git config user.email "flykoo721101@gmail.com"
      - name: 添加上游远程仓库
        run: git remote add upstream https://github.com/LibreSpark/LibreTV.git
      - name: 拉取上游代码
        run: git fetch upstream
      - name: 合并上游代码
        run: |
          git checkout main
          git merge upstream/main --allow-unrelated-histories || {
            echo "Merge conflict detected. Please resolve conflicts manually."
            exit 1
          }
          git push origin main
